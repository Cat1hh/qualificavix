<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interessados | Vix Cursos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css_adm/interessados.css">
    
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>📋 Fila de Interessados</h1>
                <p>Alunos que fizeram o Quiz e aguardam contato.</p>
            </div>
            
            <div class="acoes-topo">
                <button class="btn-acao btn-grafico" onclick="abrirModalGrafico()">
                    📊 Ver Demanda
                </button>
                <a href="menu.html" class="btn-acao btn-voltar">⬅️ Voltar</a>
            </div>
        </div>

        <table class="tabela-admin">
            <thead>
                <tr>
                    <th>Nome do Lead</th>
                    <th>Telefone (WhatsApp)</th>
                    <th>Região</th>
                    <th>Perfil (Curso)</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align:center; padding: 20px;">Carregando dados do banco... 🐢</td></tr>
            </tbody>
        </table>
    </div>

    <div id="modalGrafico" class="modal-overlay">
        <div class="modal-grafico">
            <button class="fechar-modal" onclick="fecharModalGrafico()">&times;</button>
            <h2 style="color: #0f2247; text-align: center; margin-bottom: 5px;">📈 Demanda por Categorias</h2>
            <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">Volume de interessados baseados no Quiz Vocacional.</p>
            
            <div class="controles-grafico">
                <button id="btnBarra" class="btn-toggle ativo" onclick="mudarTipoGrafico('bar')">📊 Em Barras</button>
                <button id="btnLinha" class="btn-toggle" onclick="mudarTipoGrafico('line')">📈 Em Linhas</button>
            </div>

            <canvas id="graficoDemanda" width="400" height="200"></canvas>
        </div>
    </div>

    <script src="adminjs/interessados.js"></script>

</body>
</html>
