<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento - Vix Cursos</title>
    <link rel="stylesheet" href="css_adm/cursos.css">

</head>
<body>

<nav class="navbar">
    <h1>📊 Monitoramento de Turmas</h1>
    <a class="btn btn-outline" href="menu.html">⬅ Voltar ao Menu Admin</a>
</nav>

<div class="container">
    <div class="kpi-grid">
        <div class="kpi-card" style="border-left-color: var(--primary);">
            <h3>Média de Frequência Geral</h3>
            <div class="valor">87%</div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--success);">
            <h3>Alunos Aprovados (Últimos 30 dias)</h3>
            <div class="valor">142</div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--warning);">
            <h3>Turmas em Andamento</h3>
            <div class="valor" id="turmasAtivas">--</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h2>📈 Frequência por Turma</h2>
            <div id="listaProgresso">
                <p style="color: var(--text-light);">Carregando métricas...</p>
            </div>
        </div>

        <div class="card">
            <h2>🏆 Alunos Destaque</h2>
            <div id="listaRanking">
                </div>
        </div>
    </div>
</div>

<script>
    // 1. Busca os cursos reais no banco para contar as turmas ativas
    async function carregarTurmasAtivas() {
        try {
            const res = await fetch("/cursos");
            const cursos = await res.json();
            const ativos = cursos.filter(c => c.status !== 'esgotado').length;
            document.getElementById("turmasAtivas").innerText = ativos;
        } catch (err) {
            console.error(err);
        }
    }

    // 2. Simula o desempenho das turmas (No futuro, virá de um JOIN do banco)
    function renderizarProgresso() {
        const turmasSimuladas = [
            { nome: "Programação Web - Turma A", frequencia: 92 },
            { nome: "Gastronomia - Turma B", frequencia: 75 },
            { nome: "Estética Avançada - Turma Única", frequencia: 88 },
            { nome: "Manutenção de Celulares", frequencia: 60 }
        ];

        let html = "";
        turmasSimuladas.forEach(t => {
            // Define a cor baseada na frequência
            let cor = "var(--success)";
            if (t.frequencia < 70) cor = "var(--danger)";
            else if (t.frequencia < 80) cor = "var(--warning)";

            html += `
            <div class="progresso-item">
                <div class="progresso-header">
                    <span>${t.nome}</span>
                    <span style="color: ${cor}">${t.frequencia}%</span>
                </div>
                <div class="barra-fundo">
                    <div class="barra-preenchimento" style="width: ${t.frequencia}%; background-color: ${cor};"></div>
                </div>
            </div>`;
        });
        document.getElementById("listaProgresso").innerHTML = html;
    }

    // 3. Simula os melhores alunos (Ranking)
    function renderizarRanking() {
        const rankingSimulado = [
            { nome: "Carlos Eduardo", curso: "Programação Web", nota: "9.8" },
            { nome: "Amanda Silva", curso: "Gastronomia", nota: "9.5" },
            { nome: "Roberto Alves", curso: "Manutenção de Celulares", nota: "9.1" },
            { nome: "Júlia Costa", curso: "Estética Avançada", nota: "8.9" }
        ];

        let html = "";
        rankingSimulado.forEach(a => {
            // Pega a primeira letra do nome para o Avatar
            const inicial = a.nome.charAt(0).toUpperCase();

            html += `
            <div class="aluno-item">
                <div class="aluno-avatar">${inicial}</div>
                <div class="aluno-info">
                    <div class="aluno-nome">${a.nome}</div>
                    <div class="aluno-curso">${a.curso}</div>
                </div>
                <div class="aluno-nota">⭐ ${a.nota}</div>
            </div>`;
        });
        document.getElementById("listaRanking").innerHTML = html;
    }

    // Inicializa a página
    carregarTurmasAtivas();
    renderizarProgresso();
    renderizarRanking();
</script>

</body>
</html>
